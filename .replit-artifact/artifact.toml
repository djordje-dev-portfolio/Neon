kind = "web"
previewPath = "/neonpc-store/"
title = "NeonPC Store"
version = "1.0.0"
id = "artifacts/neonpc-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/neonpc-store/" ]
localPort = 19265

[services.development]
run = "pnpm --filter @workspace/neonpc-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neonpc-store", "run", "build" ]
publicDir = "artifacts/neonpc-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19265"
BASE_PATH = "/neonpc-store/"
